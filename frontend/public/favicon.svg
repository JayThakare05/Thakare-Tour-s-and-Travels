<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle with saffron gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6A00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9F00;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)" />

  <!-- Car body -->
  <rect x="8" y="34" width="48" height="14" rx="4" fill="white" />

  <!-- Car roof / cabin -->
  <path d="M18 34 L22 22 L42 22 L46 34 Z" fill="white" />

  <!-- Windshield -->
  <path d="M22 32 L25 23 L39 23 L42 32 Z" fill="#FF9F00" opacity="0.7" />

  <!-- Left wheel -->
  <circle cx="18" cy="48" r="5" fill="#333" />
  <circle cx="18" cy="48" r="2.5" fill="#FF9F00" />

  <!-- Right wheel -->
  <circle cx="46" cy="48" r="5" fill="#333" />
  <circle cx="46" cy="48" r="2.5" fill="#FF9F00" />

  <!-- "ठा" Devanagari letter on roof -->
  <text x="32" y="31" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FF6A00" text-anchor="middle">ठा</text>
</svg>